services:
  - type: worker
    name: autoservice-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python handlers/bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BASE_WEBAPP_URL
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: MASTER_CHAT_ID
        sync: false
      - key: PG_HOST
        sync: false
      - key: PG_PORT
        value: "5432"
      - key: PG_DB
        sync: false
      - key: PG_USER
        sync: false
      - key: PG_PASSWORD
        sync: false
      - key: GHPAGES_ORIGIN
        sync: false

  - type: web
    name: autoservice-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PG_HOST
        sync: false
      - key: PG_PORT
        value: "5432"
      - key: PG_DB
        sync: false
      - key: PG_USER
        sync: false
      - key: PG_PASSWORD
        sync: false
      - key: GHPAGES_ORIGIN
        sync: false