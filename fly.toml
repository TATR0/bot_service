app = "autoservice-api"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    START_CMD = "uvicorn api:app --host 0.0.0.0 --port 8080"

[env]
  PORT = "8080"
  PG_PORT = "5432"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    interval = "30s"
    timeout = "5s"
    path = "/api/services?city=test"