<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис — запись</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-main: #0f1224;
            --bg-card: rgba(255,255,255,0.06);
            --accent: #00d4ff;
            --accent-soft: rgba(0,212,255,0.15);
            --text-main: #ffffff;
            --text-muted: #9aa0b3;
            --radius: 14px;
            --gap: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, #1a1f3c, var(--bg-main));
            min-height: 100vh;
            padding: 16px;
            color: var(--text-main);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 24px 16px 16px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #5ee7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        form {
            background: var(--bg-card);
            backdrop-filter: blur(18px);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 15px;
            transition: all 0.25s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: #888;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 0 4px rgba(0,212,255,0.15);
        }

        textarea {
            min-height: 90px;
            resize: none;
        }

        .char-count {
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
        }

        button {
            margin-top: 8px;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #5ee7ff);
            color: #000;
            font-weight: 800;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(0,212,255,0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-message {
            margin-top: 20px;
            padding: 24px;
            border-radius: var(--radius);
            background: var(--accent-soft);
            text-align: center;
            animation: fadeUp 0.5s ease;
        }

        .success-message h2 {
            color: var(--accent);
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1 id="pageTitle">🔧 АВТОСЕРВИС</h1>
        <p>Онлайн-запись на обслуживание</p>
    </div>

    <!-- Основная карточка -->
    <div id="app" class="card">
        <!-- Контент будет рендериться JS -->
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        try { tg.expand(); } catch(e){/* ignore */ }
        if (tg.themeParams?.bg_color) {
            document.documentElement.style.setProperty('--bg-main', tg.themeParams.bg_color);
        }
    }

    // API базовый URL для получения списка сервисов по городу.
    // Ожидается, что там будет реализован endpoint: GET /api/services?city=Москва
    const API_BASE = "https://botservice-production-467b.up.railway.app";

    // Получаем service_id из URL (если есть)
    const urlParams = new URLSearchParams(window.location.search);
    let serviceId = urlParams.get('service_id');

    const app = document.getElementById('app');

    // Состояние
    const state = {
        serviceId: serviceId || null,
        selectedService: null,
        city: ''
    };

    // Render helpers
    function showCityPicker() {
        app.innerHTML = `
            <div>
                <h2>Выберите город</h2>
                <p class="muted">Введите город, чтобы увидеть все зарегистрированные сервисы в нём</p>
                <div class="form-group">
                    <label style = "margin-top:20px;">Город</label>
                    <input id="cityInput" placeholder="Например: Москва" />
                </div>
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <button id="searchBtn">Найти сервисы</button>
                </div>
                <div id="servicesContainer" style="margin-top:12px;"></div>
            </div>
        `;
        document.getElementById('searchBtn').addEventListener('click', onSearchCity);
        document.getElementById('cityInput').addEventListener('keydown', (e)=>{ if (e.key==='Enter') onSearchCity(); });
    }

    async function onSearchCity() {
        const cityInput = document.getElementById('cityInput');
        const city = cityInput.value.trim();
        if (!city) {
            tg?.showAlert?.('Введите, пожалуйста, город');
            return;
        }
        state.city = city;
        const servicesContainer = document.getElementById('servicesContainer');
        servicesContainer.innerHTML = '<div class="muted">Загрузка...</div>';

        try {
            const resp = await fetch(`${API_BASE}/api/services?city=${encodeURIComponent(city)}`, { method: 'GET' });
            if (!resp.ok) {
                throw new Error('Ошибка сети');
            }
            const services = await resp.json();
            renderServicesList(services);
        } catch (err) {
            console.error(err);
            servicesContainer.innerHTML = `<div class="muted">Не удалось получить список сервисов. Попробуйте позже.</div>`;
        }
    }

    function renderServicesList(services) {
        const servicesContainer = document.getElementById('servicesContainer');
        if (!services || services.length === 0) {
            servicesContainer.innerHTML = `<div class="muted">Сервисы в городе <b>${escapeHtml(state.city)}</b> не найдены.</div>`;
            return;
        }
        servicesContainer.innerHTML = `
            <div class="muted">Найдено сервисов: ${services.length}</div>
            <div class="services-list" id="list"></div>
        `;
        const list = document.getElementById('list');
        services.forEach(s => {
            const el = document.createElement('div');
            el.className = 'service-item';
            el.innerHTML = `<div>
                                <div><b>${escapeHtml(s.service_name)}</b></div>
                                <div class="muted">${escapeHtml(s.service_number || '')} ${s.location_service ? ' • ' + escapeHtml(s.location_service) : ''}</div>
                            </div>
                            <div><button data-id="${s.idservice}" class="chooseBtn">Выбрать</button></div>`;
            list.appendChild(el);
        });
        document.querySelectorAll('.chooseBtn').forEach(btn => btn.addEventListener('click', (e)=>{
            const id = e.currentTarget.getAttribute('data-id');
            state.serviceId = id;
            state.selectedService = services.find(x => x.idservice === id);
            showBookingForm();
        }));
    }

    function showBookingForm() {
        const svc = state.selectedService;
        const svcName = svc ? svc.service_name : '';
        app.innerHTML = `
            <div>
                    <form id="bookingForm">
                    <div class="form-group"><label>Ваше имя</label><input id="name" required placeholder="Иван"></div>

                    <div style="display:flex;gap:8px;">
                        <div style="flex:1" class="form-group"><label>Марка</label><input id="brand" required placeholder="Toyota"></div>
                    </div>
                    <div style="display:flex;gap:8px;">    
                        <div style="flex:1" class="form-group"><label>Модель</label><input id="model" required placeholder="Camry"></div>
                    </div>

                    <div class="form-group"><label>Госномер</label><input id="plate" required placeholder="А777АА77"></div>

                    <div class="form-group">
                        <label>Тип работы</label>
                        <select id="service" required>
                            <option value="diagnostic">Диагностика</option>
                            <option value="oil-change">Замена масла</option>
                            <option value="suspension">Подвеска</option>
                            <option value="engine">Двигатель</option>
                            <option value="body">Кузов</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Срочность</label>
                        <select id="urgency" required>
                            <option value="low">Не срочно</option>
                            <option value="medium">3–5 дней</option>
                            <option value="high">1–2 дня</option>
                            <option value="urgent">Сегодня</option>
                        </select>
                    </div>

                    <div class="form-group"><label>Телефон</label><input id="phone" required placeholder="+7 999 123-45-67"></div>

                    <div class="form-group">
                        <label>Комментарий</label>
                        <textarea id="comment" maxlength="500" placeholder="Опишите проблему..."></textarea>
                        <div class="char-count"><span id="charCount">0</span>/500</div>
                    </div>

                    <button id="submitBtn" type="submit">Отправить заявку</button>
                </form>
            </div>
        `;

        const form = document.getElementById('bookingForm');
        const comment = document.getElementById('comment');
        const charCount = document.getElementById('charCount');
        const btn = document.getElementById('submitBtn');

        comment.addEventListener('input', () => { charCount.textContent = comment.value.length; });
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!form.checkValidity()) {
                tg?.showAlert?.('Заполните все обязательные поля');
                return;
            }

            if (!state.serviceId) {
                tg?.showAlert?.('Ошибка: Service ID не выбран. Попробуйте снова.');
                return;
            }

            const data = {
                service_id: state.serviceId,
                client_name: document.getElementById('name').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                plate: document.getElementById('plate').value,
                service: document.getElementById('service').value,
                urgency: document.getElementById('urgency').value,
                phone: document.getElementById('phone').value,
                comment: document.getElementById('comment').value,
                city: state.city || '',
                user: tg?.initDataUnsafe?.user
            };

            btn.disabled = true;
            btn.textContent = 'Отправка...';

            try {
                tg.sendData(JSON.stringify(data));
            } catch (error) {
                console.error('Ошибка при отправке:', error);
            }

            setTimeout(() => {
                form.remove();
                document.querySelector('.container').insertAdjacentHTML(
                    'beforeend',
                    `<div class="success-message">
                        <h2>✅ Заявка отправлена</h2>
                        <p>Мы свяжемся с вами в ближайшее время</p>
                    </div>`
                );
            }, 400);
        });
    }

    function showBookingFormDirect() {
        if (state.selectedService && state.selectedService.service_name) {
            const el = document.getElementById('pageTitle');
            if (el) el.textContent = '🔧 ' + state.selectedService.service_name.toUpperCase();
        }
        showBookingForm();
    }

    // Если у нас есть service_id в URL — сразу форма, иначе — выбор города
    if (state.serviceId) {
        // ✅ Загружаем название сервиса перед показом формы
        (async () => {
            try {
                const resp = await fetch(`${API_BASE}/api/service/${state.serviceId}`);
                if (resp.ok) {
                    const svc = await resp.json();
                    state.selectedService = svc;
                }
            } catch(e) { /* не критично */ }
            showBookingFormDirect();
        })();
    } else {
        showCityPicker();
    }

    // Утилиты
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, function (m) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m];
        });
    }
</script>
</body>
</html>
